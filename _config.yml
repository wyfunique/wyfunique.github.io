# Site Info
title: IF's Tech Blog
url: http://wyfunqie.github.io
logo: '/public/logo.png'
tagline: 'Tech is beautiful'

# Site configurations
gems:
  - jekyll-paginate
markdown: kramdown
kramdown:
  input: GFM
excerpt_separator: "<!-- more -->"
sass:
  style: compressed
  sass_dir: _scss    
paginate: 5
paginate_path: '/blog/page:num'
permalink: pretty

version: 1.0.0

# About/contact
author:
  name: wyfunique
  description: A full stack developer.
  gravatar: 
  contact:
    linkedin:  
    github:    https://github.com/wyfunique
    # facebook:  <hide>
    twitter:   
    weibo:     
    email:    

# Navigation (2nd level links supported)
nav:
  Home:           
    - '/'
  Blog:           
    - '/blog/'
    - { Categories: '/blog/categories/' }
    - { Tags: '/blog/tags/' }
  About:          
    - '/about/'
  Github Project: 
    - 'http://github.com/wyfunique'

# Where are tags and categories displayed
tag_page: '/blog/tags/'
category_page: '/blog/categories/'

# Home page 
hero:
  image: /public/img/tech-brain-blue.jpg
  caption: Learn technology and enjoy it
  
# Puglins
mathjax: true # whether support mathjax
google_analytics_token: 'UA-113789303-1' # leave blank if you don't want google analytics
disqus_short_name: 

plugins:
  - jekyll-seo-tag
